name: Run Selected Python Script

on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Select script to run'
        required: true
        type: choice
        options:
          - 'Closing.py'
          - 'Current_Stock.py'
          - 'rm_rejection.py'
          - 'Mt_Zip_Ageing.py'
          - 'Mt_Zip_db.py'
          - '180_useable_notUseable.py'
          - 'products_180.py'
          - 'Upcoming.py'
          - 'All Scripts'
      closing_month:
        description: 'Closing.py — select month (last day used as TO_DATE). "auto" = previous month.'
        required: false
        type: choice
        options:
          - 'auto'
          - '2026-03'
          - '2026-02'
          - '2026-01'
          - '2025-12'
          - '2025-11'
          - '2025-10'
          - '2025-09'
          - '2025-08'
          - '2025-07'
          - '2025-06'
          - '2025-05'
          - '2025-04'
          - '2025-03'
          - '2025-02'
          - '2025-01'
      current_date:
        description: 'Current_Stock.py — as-of date (YYYY-MM-DD). Leave blank for today.'
        required: false
        type: string

jobs:
  run-selected-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas python-dotenv pytz gspread gspread-dataframe google-auth openpyxl

      - name: Create .env
        run: |
          echo "ODOO_URL=${{ secrets.ODOO_URL }}" >> .env
          echo "ODOO_DB=${{ secrets.ODOO_DB }}" >> .env
          echo "ODOO_USERNAME=${{ secrets.ODOO_USERNAME }}" >> .env
          echo "ODOO_PASSWORD=${{ secrets.ODOO_PASSWORD }}" >> .env
          echo "GOOGLE_CREDS_BASE64=${{ secrets.GOOGLE_CREDS_BASE64 }}" >> .env

      - name: Decode Google credentials
        env:
          GOOGLE_CREDS_BASE64: ${{ secrets.GOOGLE_CREDS_BASE64 }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/service_account.json
        run: |
          echo "$GOOGLE_CREDS_BASE64" | base64 --decode > service_account.json

      - name: Validate environment files
        run: |
          if [ ! -f ".env" ]; then
            echo ".env file is missing!"; exit 1;
          fi
          if [ ! -s ".env" ]; then
            echo ".env file is empty!"; exit 1;
          fi
          if [ ! -f "service_account.json" ]; then
            echo "service_account.json is missing!"; exit 1;
          fi
          if ! grep -q '"type": "service_account"' service_account.json; then
            echo "service_account.json is malformed!"; exit 1;
          fi

      - name: Resolve date inputs
        run: |
          CLOSING_MONTH="${{ inputs.closing_month }}"
          if [ -n "$CLOSING_MONTH" ] && [ "$CLOSING_MONTH" != "auto" ]; then
            YEAR=$(echo "$CLOSING_MONTH" | cut -d'-' -f1)
            MONTH=$(echo "$CLOSING_MONTH" | cut -d'-' -f2)
            LAST_DAY=$(date -d "${YEAR}-${MONTH}-01 +1 month -1 day" +%Y-%m-%d)
            echo "TO_DATE=$LAST_DAY" >> $GITHUB_ENV
            echo "Closing TO_DATE resolved to: $LAST_DAY"
          fi

          CURRENT_DATE_INPUT="${{ inputs.current_date }}"
          if [ -n "$CURRENT_DATE_INPUT" ]; then
            echo "CURRENT_DATE=$CURRENT_DATE_INPUT" >> $GITHUB_ENV
            echo "Current stock date set to: $CURRENT_DATE_INPUT"
          fi

      - name: Run selected script
        run: |
          if [ "${{ inputs.script }}" = "All Scripts" ]; then
            echo "Running all scripts..."
            python Closing.py
            python Current_Stock.py
            python rm_rejection.py
            python 180_useable_notUseable.py
            python products_180.py
            python Upcoming.py
          else
            echo "Running ${{ inputs.script }}..."
            python "${{ inputs.script }}"
          fi

      - name: Upload generated Excel files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-reports-${{ github.run_number }}
          path: |
            download/*.xlsx
            *.xlsx
          retention-days: 7
